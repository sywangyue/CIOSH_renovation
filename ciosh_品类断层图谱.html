g.style.cssText='display:grid;grid-template-columns:64px repeat(8,1fr);gap:3px;';

const empt=document.createElement('div');
g.appendChild(empt);
cats.forEach(c=>{
  const d=document.createElement('div');
  d.style.cssText='font-size:9.5px;font-weight:500;color:var(--color-text-secondary);text-align:center;padding:0 2px 5px;line-height:1.4;';
  d.textContent=c;
  g.appendChild(d);
});

let sel=null;
tiers.forEach(t=>{
  const lbl=document.createElement('div');
  lbl.style.cssText='font-size:9.5px;font-weight:500;color:var(--color-text-secondary);display:flex;flex-direction:column;justify-content:center;padding-right:3px;line-height:1.5;';
  lbl.innerHTML=`<span style="color:var(--color-text-primary);font-weight:500;">${t.l}</span><span style="opacity:.65;font-size:9px;">${t.s}</span>`;
  g.appendChild(lbl);
  cats.forEach(cat=>{
    const cd=D[cat][t.id];
    const cell=document.createElement('div');
    cell.className='mc '+zc[cd.z];
    cell.textContent=cd.n;
    cell.style.whiteSpace='pre-line';
    cell.onclick=()=>{
      if(sel)sel.classList.remove('sel');
      cell.classList.add('sel');
      sel=cell;
      showDetail(cat,t,cd);
    };
    g.appendChild(cell);
  });
});

function showDetail(cat,t,cd){
  document.getElementById('dp').innerHTML=`

  <span style="font-size:14px;font-weight:500;color:var(--color-text-primary);">${cat} · ${t.l}</span>
  <span class="bd ${zb[cd.z]}">${zl[cd.z]}</span>

<div style="display:grid;gap:7px;font-size:12px;">
  <div style="display:flex;gap:8px;"><span style="color:var(--color-text-secondary);min-width:60px;flex-shrink:0;">产品形态</span><span style="color:var(--color-text-primary);">${cd.p}</span></div>
